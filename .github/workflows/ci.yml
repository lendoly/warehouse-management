name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests with coverage
        working-directory: fcs-interview-code-assignment-main/java-assignment
        run: ./mvnw test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: fcs-interview-code-assignment-main/java-assignment/target/jacoco-report/
          retention-days: 14

      - name: Coverage summary
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: fcs-interview-code-assignment-main/java-assignment/target/jacoco-report/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Test Coverage"
          min-coverage-overall: 0
          min-coverage-changed-files: 0
