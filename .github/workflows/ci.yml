name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run tests with coverage
        working-directory: fcs-interview-code-assignment-main/java-assignment
        run: ./mvnw test

      - name: Print coverage summary
        if: always()
        working-directory: fcs-interview-code-assignment-main/java-assignment
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse("target/jacoco-report/jacoco.xml")
          root = tree.getroot()

          print("\n========== Test Coverage Summary ==========")
          print(f"{'Type':<15} {'Covered':>10} {'Missed':>10} {'Total':>10} {'Coverage':>10}")
          print("-" * 58)

          for counter in root.findall("counter"):
              ctype = counter.get("type")
              covered = int(counter.get("covered", 0))
              missed  = int(counter.get("missed",  0))
              total   = covered + missed
              pct     = (covered / total * 100) if total > 0 else 0.0
              print(f"{ctype:<15} {covered:>10} {missed:>10} {total:>10} {pct:>9.1f}%")

          print("=" * 58)
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: fcs-interview-code-assignment-main/java-assignment/target/jacoco-report/
          retention-days: 14

      - name: Coverage summary
        if: always()
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: fcs-interview-code-assignment-main/java-assignment/target/jacoco-report/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Test Coverage"
          min-coverage-overall: 0
          min-coverage-changed-files: 0
